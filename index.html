<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Reschedule Your Appointment - Arena Animation CST</title>
<style>
  :root{
    --maroon:#6e1f2a;
    --maroon-dark:#4a141c;
    --gold:#c9a13b;
    --cream:#faf6ef;
    --ink:#2a2420;
    --muted:#8a7e74;
    --line:#e8ddd0;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  body{
    font-family:'Segoe UI',system-ui,-apple-system,sans-serif;
    background:var(--cream);
    color:var(--ink);
    min-height:100vh;
    display:flex;
    justify-content:center;
    padding:24px 16px;
  }
  .card{
    width:100%;
    max-width:420px;
    background:#fff;
    border-radius:16px;
    overflow:hidden;
    box-shadow:0 4px 24px rgba(110,31,42,0.08);
    border:1px solid var(--line);
  }
  .header{
    background:linear-gradient(135deg,var(--maroon) 0%,var(--maroon-dark) 100%);
    color:#fff;
    padding:28px 24px;
    text-align:center;
  }
  .header .brand{
    font-size:13px;
    letter-spacing:2px;
    text-transform:uppercase;
    color:var(--gold);
    font-weight:600;
    margin-bottom:6px;
  }
  .header h1{
    font-size:21px;
    font-weight:600;
    line-height:1.3;
  }
  .header p{
    font-size:13px;
    opacity:0.85;
    margin-top:6px;
  }
  .body{padding:24px;}
  .step-label{
    font-size:12px;
    font-weight:700;
    text-transform:uppercase;
    letter-spacing:1px;
    color:var(--maroon);
    margin-bottom:10px;
  }
  .name-input{
    width:100%;
    padding:12px 14px;
    border:1px solid var(--line);
    border-radius:10px;
    font-size:15px;
    margin-bottom:24px;
    background:var(--cream);
  }
  .name-input:focus{
    outline:none;
    border-color:var(--maroon);
  }
  .dates-grid{
    display:grid;
    grid-template-columns:repeat(3,1fr);
    gap:10px;
    margin-bottom:24px;
  }
  .date-pill{
    border:1.5px solid var(--line);
    border-radius:10px;
    padding:10px 6px;
    text-align:center;
    cursor:pointer;
    transition:all 0.15s;
    background:#fff;
  }
  .date-pill .dow{
    font-size:11px;
    color:var(--muted);
    text-transform:uppercase;
    letter-spacing:0.5px;
  }
  .date-pill .dnum{
    font-size:18px;
    font-weight:700;
    margin:2px 0;
    color:var(--ink);
  }
  .date-pill .mon{
    font-size:11px;
    color:var(--muted);
  }
  .date-pill.selected{
    border-color:var(--maroon);
    background:linear-gradient(135deg,#fdf3f0,#fff8ef);
  }
  .date-pill.selected .dnum{color:var(--maroon);}
  .date-pill.disabled{
    opacity:0.35;
    cursor:not-allowed;
    background:#f5f5f5;
  }
  .slots-grid{
    display:grid;
    grid-template-columns:repeat(2,1fr);
    gap:10px;
    margin-bottom:8px;
  }
  .slot-pill{
    border:1.5px solid var(--line);
    border-radius:10px;
    padding:11px 8px;
    text-align:center;
    font-size:14px;
    font-weight:500;
    cursor:pointer;
    transition:all 0.15s;
    background:#fff;
  }
  .slot-pill.selected{
    border-color:var(--gold);
    background:linear-gradient(135deg,#fdf6e8,#fffdf5);
    color:#8a6a17;
    font-weight:700;
  }
  .slot-pill.disabled{
    opacity:0.35;
    cursor:not-allowed;
    background:#f5f5f5;
    text-decoration:line-through;
  }
  .empty-msg{
    font-size:13px;
    color:var(--muted);
    text-align:center;
    padding:20px 0;
  }
  .summary{
    background:var(--cream);
    border:1px dashed var(--gold);
    border-radius:10px;
    padding:14px;
    margin:20px 0;
    font-size:13px;
    line-height:1.6;
  }
  .summary b{color:var(--maroon);}
  .cta{
    display:block;
    width:100%;
    padding:15px;
    border:none;
    border-radius:10px;
    background:linear-gradient(135deg,#25D366,#1ebd5a);
    color:#fff;
    font-size:15px;
    font-weight:700;
    cursor:pointer;
    text-decoration:none;
    text-align:center;
    transition:opacity 0.15s;
  }
  .cta:active{opacity:0.85;}
  .cta.disabled{
    background:#ccc;
    pointer-events:none;
  }
  .cta i{margin-right:8px;}
  .footnote{
    text-align:center;
    font-size:11px;
    color:var(--muted);
    margin-top:14px;
    line-height:1.5;
  }
  .loading{
    text-align:center;
    padding:40px 20px;
    color:var(--muted);
    font-size:13px;
  }
</style>
</head>
<body>

<div class="card">
  <div class="header">
    <div class="brand">Arena Animation CST</div>
    <h1>Reschedule your free<br>career counselling session</h1>
    <p>Pick a new date &amp; time that works for you</p>
  </div>

  <div class="body" id="appBody">
    <div class="loading">Loading available slots...</div>
  </div>
</div>

<script>
const BIN_ID = "6a2a6d3fda38895dfeabe333";
const API_KEY = "$2a$10$P7VEzBc.j5zUfCUNbw/X5e10mHmBgEXLeOF8ONana6GfCMdt2VMTi";
const BASE_URL = "https://api.jsonbin.io/v3/b/" + BIN_ID;
const ARENA_NUMBER = "918828823738";

let config = null;
let selectedDate = null;
let selectedSlot = null;

async function loadConfig(){
  try{
    const res = await fetch(BASE_URL + "/latest", {
      headers: { "X-Master-Key": API_KEY }
    });
    const data = await res.json();
    config = data.record;
  }catch(e){
    config = { dates: {} };
  }
  render();
}

function formatDateLabel(dateStr){
  const d = new Date(dateStr + "T00:00:00");
  const dow = d.toLocaleDateString('en-US',{weekday:'short'});
  const dnum = d.getDate();
  const mon = d.toLocaleDateString('en-US',{month:'short'});
  return {dow, dnum, mon};
}

function render(){
  const body = document.getElementById('appBody');
  const dates = Object.keys(config.dates || {}).sort();

  if(dates.length === 0){
    body.innerHTML = '<div class="empty-msg">No slots available right now.<br>Please contact us directly on WhatsApp.</div>';
    return;
  }

  let html = '';
  html += '<div class="step-label">Your name</div>';
  html += '<input type="text" class="name-input" id="studentName" placeholder="Enter your full name">';

  html += '<div class="step-label">Select a date</div>';
  html += '<div class="dates-grid">';
  dates.forEach(dateStr=>{
    const dayConf = config.dates[dateStr];
    const isAvailable = dayConf.available !== false && (dayConf.slots||[]).some(s=>s.available !== false);
    const lbl = formatDateLabel(dateStr);
    html += `<div class="date-pill ${isAvailable?'':'disabled'} ${selectedDate===dateStr?'selected':''}"
              onclick="${isAvailable?`selectDate('${dateStr}')`:''}">
              <div class="dow">${lbl.dow}</div>
              <div class="dnum">${lbl.dnum}</div>
              <div class="mon">${lbl.mon}</div>
            </div>`;
  });
  html += '</div>';

  if(selectedDate){
    html += '<div class="step-label">Select a time slot</div>';
    const slots = (config.dates[selectedDate].slots || []);
    if(slots.length === 0){
      html += '<div class="empty-msg">No time slots set for this date.</div>';
    }else{
      html += '<div class="slots-grid">';
      slots.forEach(slot=>{
        const avail = slot.available !== false;
        html += `<div class="slot-pill ${avail?'':'disabled'} ${selectedSlot===slot.time?'selected':''}"
                  onclick="${avail?`selectSlot('${slot.time}')`:''}">${slot.time}</div>`;
      });
      html += '</div>';
    }
  }

  if(selectedDate && selectedSlot){
    const lbl = formatDateLabel(selectedDate);
    const fullDate = new Date(selectedDate+"T00:00:00").toLocaleDateString('en-IN',{day:'numeric',month:'long',year:'numeric'});
    html += `<div class="summary">
      <b>Selected:</b> ${fullDate} at ${selectedSlot}<br>
      Tap the button below to confirm via WhatsApp. Our team will get back to you shortly to confirm your slot.
    </div>`;
  }

  const ready = selectedDate && selectedSlot;
  const nameVal = document.getElementById('studentName')?.value || '';

  html += `<a class="cta ${ready?'':'disabled'}" id="confirmBtn" href="#">
    <i>&#9989;</i> Confirm via WhatsApp
  </a>`;

  html += `<div class="footnote">
    Your first session is completely complimentary.<br>
    By submitting, our admissions team will confirm your new slot.
  </div>`;

  body.innerHTML = html;

  const nameInput = document.getElementById('studentName');
  if(nameInput){
    nameInput.value = nameVal;
    nameInput.addEventListener('input', updateButton);
  }
  updateButton();
}

function selectDate(dateStr){
  selectedDate = dateStr;
  selectedSlot = null;
  render();
}

function selectSlot(time){
  selectedSlot = time;
  render();
}

function updateButton(){
  const btn = document.getElementById('confirmBtn');
  if(!btn) return;
  const name = document.getElementById('studentName').value.trim();
  if(selectedDate && selectedSlot && name){
    btn.classList.remove('disabled');
    const fullDate = new Date(selectedDate+"T00:00:00").toLocaleDateString('en-IN',{day:'numeric',month:'long',year:'numeric'});
    const msg = `Hi! I would like to reschedule my appointment.\n\nName: ${name}\nNew Date: ${fullDate}\nNew Time: ${selectedSlot}\n\nPlease confirm this slot for me. Thank you!`;
    btn.href = `https://wa.me/${ARENA_NUMBER}?text=${encodeURIComponent(msg)}`;
    btn.target = "_blank";
  }else{
    btn.classList.add('disabled');
    btn.removeAttribute('href');
  }
}

loadConfig();
</script>

</body>
</html>
